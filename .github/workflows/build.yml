name: Build desktop packages

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS ARM64
            runner: macos-15
            rustTarget: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
            artifactGlob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            artifactName: HomeNet-macos-arm64
            assetSuffix: macos-arm64.dmg
          - label: Windows x64
            runner: windows-latest
            rustTarget: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
            artifactGlob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            artifactName: HomeNet-windows-x64
            assetSuffix: windows-x64-setup.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify static checks
        run: |
          node scripts/verify-ui-reference.mjs
          node scripts/verify-port-expression.mjs
          node scripts/verify-ci-workflow.mjs

      - name: Build Tauri package
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Normalize package name
        shell: pwsh
        run: |
          $source = Get-ChildItem -Path "${{ matrix.artifactGlob }}" | Select-Object -First 1
          if (-not $source) {
            throw "未找到构建产物：${{ matrix.artifactGlob }}"
          }
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $target = Join-Path release-assets "HomeNet_${{ github.ref_name }}_${{ matrix.assetSuffix }}"
          Copy-Item -LiteralPath $source.FullName -Destination $target
          Get-ChildItem release-assets

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Build changelog from commits
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: COMMIT
          failOnError: true
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                {
                  "title": "## 功能",
                  "labels": ["feat"]
                },
                {
                  "title": "## 修复",
                  "labels": ["fix"]
                },
                {
                  "title": "## CI / 构建",
                  "labels": ["ci", "build"]
                },
                {
                  "title": "## 文档",
                  "labels": ["docs"]
                },
                {
                  "title": "## 维护",
                  "labels": ["chore", "refactor", "style", "test", "perf", "revert"]
                },
                {
                  "title": "## 其他",
                  "labels": []
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([\\w\\-.]+\\))?(!)?: ([\\s\\S]*)",
                  "on_property": "title",
                  "target": "$1"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release with generated changelog
        uses: softprops/action-gh-release@v3
        with:
          name: 网络管家 ${{ github.ref_name }}
          body: ${{ steps.build_changelog.outputs.changelog }}
          files: release-assets/*
          fail_on_unmatched_files: true

name: Build desktop artifacts

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metadata:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.release.outputs.release_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_name: ${{ steps.release.outputs.release_name }}
      changelog_to: ${{ steps.release.outputs.changelog_to }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            release_version="${release_tag#v}"
            changelog_to="${GITHUB_REF_NAME}"
          else
            base_version="$(node -e "const version = JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version.split('.'); console.log(version.slice(0, 2).join('.'))")"
            commit_count="$(git rev-list --count HEAD)"
            release_version="${base_version}.${commit_count}"
            release_tag="v${release_version}"
            changelog_to="${GITHUB_SHA}"
          fi

          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=HomeNet ${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "changelog_to=${changelog_to}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.label }}
    needs: metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS ARM64
            runner: macos-15
            rustTarget: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
            portableGlob: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            installerGlob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            updaterGlob: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            artifactName: HomeNet-macos-arm64
            portableSuffix: macos-arm64-app.zip
            installerSuffix: macos-arm64.dmg
            updaterSuffix: macos-arm64-app.tar.gz
            updaterTargets: darwin-aarch64-app,darwin-aarch64
            portableMode: zip
          - label: Windows x64
            runner: windows-latest
            rustTarget: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
            portableGlob: src-tauri/target/x86_64-pc-windows-msvc/release/homenet.exe
            installerGlob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            updaterGlob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            artifactName: HomeNet-windows-x64
            portableSuffix: windows-x64-portable.zip
            installerSuffix: windows-x64-setup.exe
            updaterSuffix: windows-x64-updater.exe
            updaterTargets: windows-x86_64-nsis,windows-x86_64
            portableMode: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply release version
        env:
          HOMENET_RELEASE_VERSION: ${{ needs.metadata.outputs.release_version }}
        run: node scripts/apply-release-version.mjs

      - name: Verify static checks
        run: |
          node scripts/verify-ui-reference.mjs
          node scripts/verify-port-expression.mjs
          node scripts/verify-ci-workflow.mjs

      - name: Import Apple Developer Certificate
        if: ${{ matrix.runner == 'macos-15' && github.event_name != 'pull_request' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "${APPLE_CERTIFICATE}" | base64 --decode > certificate.p12
          security create-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Resolve Apple signing identity
        if: ${{ matrix.runner == 'macos-15' && github.event_name != 'pull_request' }}
        shell: bash
        run: |
          CERT_INFO="$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -n 1 || true)"
          if [[ -z "${CERT_INFO}" ]]; then
            CERT_INFO="$(security find-identity -v -p codesigning build.keychain | head -n 1 || true)"
          fi
          if [[ -z "${CERT_INFO}" ]]; then
            echo "No Apple signing identity found in build keychain" >&2
            exit 1
          fi
          CERT_ID="$(echo "${CERT_INFO}" | awk -F '"' '{print $2}')"
          echo "APPLE_SIGNING_IDENTITY_RESOLVED=${CERT_ID}" >> "${GITHUB_ENV}"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMENET_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY_RESOLVED || secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ matrix.args }} ${{ github.event_name != 'pull_request' && '--config src-tauri/tauri.updater.conf.json' || '' }}

      - name: Staple macOS app notarization ticket
        if: ${{ matrix.runner == 'macos-15' && github.event_name != 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name "*.app" -type d | head -n 1 || true)"
          DMG_PATH="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name "*.dmg" -type f | head -n 1 || true)"
          if [[ -z "${APP_PATH}" ]]; then
            echo "No macOS .app found for stapling" >&2
            exit 1
          fi
          if [[ -z "${DMG_PATH}" ]]; then
            echo "No macOS .dmg found for stapling" >&2
            exit 1
          fi

          xcrun stapler staple "${APP_PATH}"
          xcrun stapler staple "${DMG_PATH}"

      - name: Verify macOS signing and notarization
        if: ${{ matrix.runner == 'macos-15' && github.event_name != 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name "*.app" -type d | head -n 1 || true)"
          DMG_PATH="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name "*.dmg" -type f | head -n 1 || true)"
          if [[ -z "${APP_PATH}" ]]; then
            echo "No macOS .app found for verification" >&2
            exit 1
          fi
          if [[ -z "${DMG_PATH}" ]]; then
            echo "No macOS .dmg found for verification" >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          spctl -a -t exec -vv "${APP_PATH}"
          xcrun stapler validate "${APP_PATH}"
          codesign --verify --verbose=2 "${DMG_PATH}"
          spctl -a -t open --context context:primary-signature -vv "${DMG_PATH}"
          xcrun stapler validate "${DMG_PATH}"

      - name: Normalize package name
        shell: pwsh
        run: |
          function Get-FirstArtifact($pattern, $label) {
            $source = Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $source) {
              throw "未找到 ${label}: ${pattern}"
            }
            return $source
          }

          function Export-Artifact($source, $target, $mode) {
            $sourcePath = $source.FullName
            if (Test-Path -LiteralPath $target) {
              Remove-Item -LiteralPath $target -Force
            }
            if ($mode -eq "zip") {
              if ($IsMacOS) {
                & ditto -c -k --sequesterRsrc --keepParent $sourcePath $target
                if ($LASTEXITCODE -ne 0) {
                  throw "压缩应用目录失败: ${sourcePath}"
                }
              } else {
                Compress-Archive -LiteralPath $sourcePath -DestinationPath $target -Force
              }
            } else {
              Copy-Item -LiteralPath $sourcePath -Destination $target
            }
          }

          function Read-UpdaterSignature($source) {
            $signaturePath = "$($source.FullName).sig"
            if (-not (Test-Path -LiteralPath $signaturePath)) {
              throw "Missing updater signature: ${signaturePath}"
            }
            return (Get-Content -Raw -LiteralPath $signaturePath).Trim()
          }

          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $portableTarget = Join-Path release-assets "HomeNet_${{ needs.metadata.outputs.release_tag }}_${{ matrix.portableSuffix }}"
          $installerTarget = Join-Path release-assets "HomeNet_${{ needs.metadata.outputs.release_tag }}_${{ matrix.installerSuffix }}"
          $portable = Get-FirstArtifact "${{ matrix.portableGlob }}" "免安装产物"
          Export-Artifact $portable $portableTarget "${{ matrix.portableMode }}"
          $installer = Get-FirstArtifact "${{ matrix.installerGlob }}" "安装产物"
          Export-Artifact $installer $installerTarget "file"
          if ("${{ github.event_name }}" -ne "pull_request") {
            $updaterTarget = Join-Path release-assets "HomeNet_${{ needs.metadata.outputs.release_tag }}_${{ matrix.updaterSuffix }}"
            $updater = Get-FirstArtifact "${{ matrix.updaterGlob }}" "updater artifact"
            Export-Artifact $updater $updaterTarget "file"
            $updaterAssetName = Split-Path -Leaf $updaterTarget
            $updaterSignature = Read-UpdaterSignature $updater
            $fragment = [ordered]@{
              targets = "${{ matrix.updaterTargets }}".Split(",")
              url = "https://github.com/${{ github.repository }}/releases/download/${{ needs.metadata.outputs.release_tag }}/${updaterAssetName}"
              signature = $updaterSignature
            }
            $fragment | ConvertTo-Json -Depth 5 | Set-Content -Encoding UTF8 -LiteralPath (Join-Path release-assets "updater-${{ matrix.artifactName }}.json")
          }
          Get-ChildItem release-assets

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Build changelog from commits
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: COMMIT
          toTag: ${{ needs.metadata.outputs.changelog_to }}
          offlineMode: true
          failOnError: true
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                {
                  "title": "## 功能",
                  "labels": ["feat"]
                },
                {
                  "title": "## 修复",
                  "labels": ["fix"]
                },
                {
                  "title": "## CI / 构建",
                  "labels": ["ci", "build"]
                },
                {
                  "title": "## 文档",
                  "labels": ["docs"]
                },
                {
                  "title": "## 维护",
                  "labels": ["chore", "refactor", "style", "test", "perf", "revert"]
                },
                {
                  "title": "## 其他",
                  "labels": []
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([\\w\\-.]+\\))?(!)?: ([\\s\\S]*)",
                  "on_property": "title",
                  "target": "$1"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate updater manifest
        shell: pwsh
        run: |
          $platforms = [ordered]@{}
          $fragments = Get-ChildItem -Path release-assets -Recurse -Filter "updater-*.json"
          if (-not $fragments) {
            throw "No updater manifest fragments found"
          }
          foreach ($fragment in $fragments) {
            $data = Get-Content -Raw -LiteralPath $fragment.FullName | ConvertFrom-Json
            foreach ($target in $data.targets) {
              $platforms[$target] = [ordered]@{
                signature = $data.signature
                url = $data.url
              }
            }
            Remove-Item -LiteralPath $fragment.FullName -Force
          }
          $manifest = [ordered]@{
            version = "${{ needs.metadata.outputs.release_version }}"
            notes = @"
${{ steps.build_changelog.outputs.changelog }}
"@
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = $platforms
          }
          $manifest | ConvertTo-Json -Depth 8 | Set-Content -Encoding UTF8 -LiteralPath (Join-Path release-assets "latest.json")

      - name: Move version tag to this build
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "${{ needs.metadata.outputs.release_tag }}" "${{ github.sha }}" -m "HomeNet ${{ needs.metadata.outputs.release_tag }}"
          git push origin "refs/tags/${{ needs.metadata.outputs.release_tag }}" --force

      - name: Remove lowercase release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" > /dev/null 2>&1; then
            gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name | select(startswith("homenet_"))' |
              while IFS= read -r asset_name; do
                if [[ -n "${asset_name}" ]]; then
                  gh release delete-asset "${RELEASE_TAG}" "${asset_name}" --repo "${GITHUB_REPOSITORY}" --yes
                fi
              done
          fi

      - name: Publish release with generated changelog
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.metadata.outputs.release_name }}
          body: ${{ steps.build_changelog.outputs.changelog }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
          make_latest: true

name: Build desktop artifacts

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metadata:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_name: ${{ steps.release.outputs.release_name }}
      changelog_to: ${{ steps.release.outputs.changelog_to }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            changelog_to="${GITHUB_REF_NAME}"
          else
            version="$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")"
            release_tag="v${version}"
            changelog_to="${GITHUB_SHA}"
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=HomeNet ${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "changelog_to=${changelog_to}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.label }}
    needs: metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS ARM64
            runner: macos-15
            rustTarget: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
            portableGlob: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            installerGlob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            artifactName: HomeNet-macos-arm64
            portableSuffix: macos-arm64-app.zip
            installerSuffix: macos-arm64.dmg
            portableMode: zip
          - label: Windows x64
            runner: windows-latest
            rustTarget: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
            portableGlob: src-tauri/target/x86_64-pc-windows-msvc/release/homenet.exe
            installerGlob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            artifactName: HomeNet-windows-x64
            portableSuffix: windows-x64-portable.zip
            installerSuffix: windows-x64-setup.exe
            portableMode: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify static checks
        run: |
          node scripts/verify-ui-reference.mjs
          node scripts/verify-port-expression.mjs
          node scripts/verify-ci-workflow.mjs

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Normalize package name
        shell: pwsh
        run: |
          function Get-FirstArtifact($pattern, $label) {
            $source = Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $source) {
              throw "未找到 ${label}: ${pattern}"
            }
            return $source
          }

          function Export-Artifact($source, $target, $mode) {
            $sourcePath = $source.FullName
            if (Test-Path -LiteralPath $target) {
              Remove-Item -LiteralPath $target -Force
            }
            if ($mode -eq "zip") {
              if ($IsMacOS) {
                & ditto -c -k --sequesterRsrc --keepParent $sourcePath $target
                if ($LASTEXITCODE -ne 0) {
                  throw "压缩应用目录失败: ${sourcePath}"
                }
              } else {
                Compress-Archive -LiteralPath $sourcePath -DestinationPath $target -Force
              }
            } else {
              Copy-Item -LiteralPath $sourcePath -Destination $target
            }
          }

          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $portableTarget = Join-Path release-assets "HomeNet_${{ needs.metadata.outputs.release_tag }}_${{ matrix.portableSuffix }}"
          $installerTarget = Join-Path release-assets "HomeNet_${{ needs.metadata.outputs.release_tag }}_${{ matrix.installerSuffix }}"
          $portable = Get-FirstArtifact "${{ matrix.portableGlob }}" "免安装产物"
          Export-Artifact $portable $portableTarget "${{ matrix.portableMode }}"
          $installer = Get-FirstArtifact "${{ matrix.installerGlob }}" "安装产物"
          Export-Artifact $installer $installerTarget "file"
          Get-ChildItem release-assets

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Build changelog from commits
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: COMMIT
          toTag: ${{ needs.metadata.outputs.changelog_to }}
          offlineMode: true
          failOnError: true
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                {
                  "title": "## 功能",
                  "labels": ["feat"]
                },
                {
                  "title": "## 修复",
                  "labels": ["fix"]
                },
                {
                  "title": "## CI / 构建",
                  "labels": ["ci", "build"]
                },
                {
                  "title": "## 文档",
                  "labels": ["docs"]
                },
                {
                  "title": "## 维护",
                  "labels": ["chore", "refactor", "style", "test", "perf", "revert"]
                },
                {
                  "title": "## 其他",
                  "labels": []
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([\\w\\-.]+\\))?(!)?: ([\\s\\S]*)",
                  "on_property": "title",
                  "target": "$1"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move version tag to this build
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "${{ needs.metadata.outputs.release_tag }}" "${{ github.sha }}" -m "HomeNet ${{ needs.metadata.outputs.release_tag }}"
          git push origin "refs/tags/${{ needs.metadata.outputs.release_tag }}" --force

      - name: Remove lowercase release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" > /dev/null 2>&1; then
            gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name | select(startswith("homenet_"))' |
              while IFS= read -r asset_name; do
                if [[ -n "${asset_name}" ]]; then
                  gh release delete-asset "${RELEASE_TAG}" "${asset_name}" --repo "${GITHUB_REPOSITORY}" --yes
                fi
              done
          fi

      - name: Publish release with generated changelog
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.metadata.outputs.release_name }}
          body: ${{ steps.build_changelog.outputs.changelog }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
          make_latest: true

name: Build desktop packages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS ARM64
            runner: macos-15
            rustTarget: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - label: Windows x64
            runner: windows-latest
            rustTarget: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify static checks
        run: |
          node scripts/verify-ui-reference.mjs
          node scripts/verify-port-expression.mjs
          node scripts/verify-ci-workflow.mjs

      - name: Build Tauri package
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: home-net-${{ matrix.label }}-[bundle]

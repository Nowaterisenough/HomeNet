name: Build desktop packages

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS ARM64
            runner: macos-15
            rustTarget: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
            artifactGlob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - label: Windows x64
            runner: windows-latest
            rustTarget: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
            artifactGlob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify static checks
        run: |
          node scripts/verify-ui-reference.mjs
          node scripts/verify-port-expression.mjs
          node scripts/verify-ci-workflow.mjs

      - name: Build Tauri package
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Publish GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: HomeNet ${{ github.ref_name }}
          releaseBody: |
            自动构建的 HomeNet 桌面端安装包。

            - macOS ARM64：DMG
            - Windows x64：NSIS 安装包
          releaseDraft: false
          prerelease: false

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: home-net-${{ matrix.label }}
          path: ${{ matrix.artifactGlob }}
          if-no-files-found: error
